<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>blog-agents · pipeline</title>
<style>
  :root{
    --bg:#0b0f1a; --panel:#111826; --panel-2:#0d131f; --line:#1d2740;
    --ink:#e7ecf7; --muted:#7f8daa; --faint:#4a5878;
    --signal:#6b9bff; --signal-2:#9d7bff;
    --approve:#4fd1a5; --revise:#ffb454; --blocker:#ff6b6b;
    --mono:ui-monospace,"JetBrains Mono","SFMono-Regular",Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--bg); color:var(--ink); font-family:var(--sans);
    line-height:1.5; -webkit-font-smoothing:antialiased;
    background-image:
      linear-gradient(var(--line) 1px,transparent 1px),
      linear-gradient(90deg,var(--line) 1px,transparent 1px);
    background-size:44px 44px; background-position:center;
  }
  body::before{content:"";position:fixed;inset:0;background:
    radial-gradient(120% 80% at 50% -10%,transparent 40%,var(--bg) 100%);pointer-events:none}
  .wrap{max-width:1120px;margin:0 auto;padding:28px 22px 80px;position:relative}

  /* header */
  header{display:flex;align-items:baseline;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:26px}
  .brand{display:flex;align-items:baseline;gap:14px}
  .brand h1{font-size:26px;letter-spacing:-.02em;margin:0;font-weight:650}
  .brand .tag{font-family:var(--mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted)}
  .health{display:flex;align-items:center;gap:9px;font-family:var(--mono);font-size:12px;color:var(--muted)}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--faint);box-shadow:0 0 0 0 transparent;transition:.3s}
  .dot.up{background:var(--approve);box-shadow:0 0 12px 1px color-mix(in srgb,var(--approve) 70%,transparent)}
  .dot.down{background:var(--blocker);box-shadow:0 0 12px 1px color-mix(in srgb,var(--blocker) 70%,transparent)}

  /* control bar */
  .console{background:linear-gradient(180deg,var(--panel),var(--panel-2));
    border:1px solid var(--line);border-radius:14px;padding:16px;
    display:grid;grid-template-columns:1fr 220px 120px auto;gap:12px;align-items:end}
  .field label{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.18em;
    text-transform:uppercase;color:var(--muted);margin:0 0 6px 2px}
  .field input{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--ink);
    border-radius:9px;padding:11px 12px;font-family:var(--sans);font-size:14px;outline:none;transition:.15s}
  .field input:focus{border-color:var(--signal);box-shadow:0 0 0 3px color-mix(in srgb,var(--signal) 25%,transparent)}
  button.run{background:linear-gradient(180deg,var(--signal),#4f7fe6);color:#fff;border:0;
    border-radius:9px;padding:12px 20px;font-weight:600;font-size:14px;cursor:pointer;
    font-family:var(--sans);white-space:nowrap;transition:.15s;height:44px}
  button.run:hover:not(:disabled){filter:brightness(1.08)}
  button.run:disabled{opacity:.55;cursor:progress}
  button.run:focus-visible{outline:2px solid var(--signal-2);outline-offset:2px}
  .timer{font-family:var(--mono);font-size:12px;color:var(--muted);margin-left:2px;min-height:16px}

  /* board */
  .board{position:relative;margin:34px 0 8px;padding:58px 4px 8px;
    display:flex;gap:0;align-items:stretch;justify-content:space-between}
  #cable{position:absolute;left:0;top:0;pointer-events:none;overflow:visible}
  #cable-path{fill:none;stroke:var(--line);stroke-width:2}
  #cable-flow{fill:none;stroke:url(#grad);stroke-width:2.5;stroke-linecap:round;
    stroke-dasharray:10 320;stroke-dashoffset:0;opacity:0;filter:drop-shadow(0 0 6px var(--signal))}
  #cable-flow.pulse{opacity:1;animation:travel 1.1s ease-in forwards}
  @keyframes travel{from{stroke-dashoffset:330}to{stroke-dashoffset:0}}
  .cable-tag{position:absolute;font-family:var(--mono);font-size:10px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--revise);opacity:0;transition:.3s;transform:translateY(4px)}
  .cable-tag.on{opacity:1;transform:none}

  .mod{flex:1 1 0;min-width:0;background:var(--panel-2);border:1px solid var(--line);
    border-radius:12px;padding:13px 13px 14px;position:relative;transition:.25s;overflow:hidden}
  .mod .n{font-family:var(--mono);font-size:10px;color:var(--faint);letter-spacing:.16em}
  .mod h3{margin:2px 0 0;font-size:14.5px;font-weight:600;letter-spacing:-.01em}
  .mod .read{margin-top:9px;font-family:var(--mono);font-size:11px;color:var(--muted);
    min-height:30px;word-break:break-word}
  .mod .read b{color:var(--ink);font-weight:600}
  .mod .stat{position:absolute;top:12px;right:12px;width:8px;height:8px;border-radius:50%;
    background:var(--faint);transition:.25s}
  .mod .badge{display:inline-block;margin-top:8px;font-family:var(--mono);font-size:10px;
    padding:2px 7px;border-radius:20px;border:1px solid transparent;letter-spacing:.06em}
  .connector{flex:0 0 26px;align-self:center;height:2px;background:var(--line);position:relative;top:0;transition:.3s}
  .connector.hot{background:linear-gradient(90deg,var(--signal),var(--signal-2))}

  .mod.active{border-color:var(--signal);box-shadow:0 0 0 1px var(--signal),0 0 22px -6px var(--signal);
    background:color-mix(in srgb,var(--signal) 8%,var(--panel-2))}
  .mod.active .stat{background:var(--signal);animation:blink 1s ease-in-out infinite}
  @keyframes blink{50%{opacity:.35}}
  .mod.done{border-color:color-mix(in srgb,var(--approve) 40%,var(--line))}
  .mod.done .stat{background:var(--approve);animation:none}
  .mod.warn{border-color:color-mix(in srgb,var(--revise) 55%,var(--line))}
  .mod.warn .stat{background:var(--revise)}

  .badge.approve{color:var(--approve);border-color:color-mix(in srgb,var(--approve) 45%,transparent)}
  .badge.revise{color:var(--revise);border-color:color-mix(in srgb,var(--revise) 45%,transparent)}
  .badge.rev{color:var(--signal);border-color:color-mix(in srgb,var(--signal) 45%,transparent)}

  /* lower grid */
  .lower{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:26px}
  @media(max-width:900px){
    .console{grid-template-columns:1fr}
    .board{flex-direction:column;padding-left:46px}
    .connector{width:2px;height:22px;margin-left:22px;align-self:flex-start}
    .lower{grid-template-columns:1fr}
  }
  .card{background:var(--panel-2);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .card > .head{display:flex;align-items:center;justify-content:space-between;
    padding:12px 15px;border-bottom:1px solid var(--line)}
  .card .head span{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}

  /* event log */
  .log{padding:6px 0;max-height:340px;overflow:auto;font-family:var(--mono);font-size:12px}
  .log .row{display:flex;gap:10px;padding:6px 15px;border-bottom:1px solid color-mix(in srgb,var(--line) 55%,transparent)}
  .log .row:last-child{border-bottom:0}
  .log .t{color:var(--faint);flex:0 0 52px}
  .log .msg{color:var(--muted)}
  .log .msg b{color:var(--ink);font-weight:600}
  .log .k{flex:0 0 8px;width:8px;height:8px;border-radius:50%;margin-top:5px;background:var(--faint)}
  .log .k.signal{background:var(--signal)} .log .k.approve{background:var(--approve)}
  .log .k.revise{background:var(--revise)} .log .k.blocker{background:var(--blocker)}
  .empty{padding:26px 16px;color:var(--muted);font-size:13px;font-family:var(--mono)}
  .issue{margin:4px 0 0 18px;color:var(--muted)}
  .issue .sev{color:var(--blocker)} .issue .sev.minor{color:var(--revise)}

  /* result */
  .meta{padding:13px 15px;display:grid;grid-template-columns:1fr 1fr;gap:8px 18px;font-family:var(--mono);font-size:11px}
  .meta .cell span{color:var(--faint);letter-spacing:.14em;text-transform:uppercase;display:block;font-size:10px}
  .meta .cell div{color:var(--ink);margin-top:2px;word-break:break-word}
  .post{padding:8px 20px 20px;max-height:520px;overflow:auto}
  .post h1{font-size:22px;letter-spacing:-.02em;margin:18px 0 6px}
  .post h2{font-size:17px;margin:20px 0 6px;padding-bottom:5px;border-bottom:1px solid var(--line)}
  .post h3{font-size:14.5px;margin:16px 0 4px;color:var(--signal)}
  .post p{margin:8px 0;color:#cdd6e8}
  .post ul{margin:6px 0;padding-left:20px;color:#cdd6e8}
  .post li{margin:3px 0}
  .post code{font-family:var(--mono);font-size:.9em;background:var(--bg);padding:1px 5px;border-radius:5px}
  .post blockquote{margin:10px 0;padding:8px 14px;border-left:3px solid var(--revise);
    background:color-mix(in srgb,var(--revise) 8%,transparent);color:var(--ink);border-radius:0 8px 8px 0}
  .post a{color:var(--signal)}
  .acts{display:flex;gap:8px}
  .acts button{background:var(--bg);border:1px solid var(--line);color:var(--ink);
    font-family:var(--mono);font-size:11px;padding:6px 11px;border-radius:8px;cursor:pointer;transition:.15s}
  .acts button:hover{border-color:var(--signal);color:var(--signal)}
  .acts button:focus-visible{outline:2px solid var(--signal);outline-offset:2px}
  .banner{margin:0;padding:11px 15px;font-size:13px;background:color-mix(in srgb,var(--blocker) 14%,transparent);
    border-bottom:1px solid color-mix(in srgb,var(--blocker) 40%,var(--line));color:#ffd4d4}
  .hidden{display:none}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <h1>blog&#8209;agents</h1>
      <span class="tag">signal chain</span>
    </div>
    <div class="health" id="health">
      <span class="dot" id="dot"></span><span id="health-text">checking model…</span>
    </div>
  </header>

  <div class="console">
    <div class="field">
      <label for="topic">Topic</label>
      <input id="topic" placeholder="why small teams should adopt agentic workflows" autocomplete="off" />
    </div>
    <div class="field">
      <label for="audience">Audience</label>
      <input id="audience" value="general readers" autocomplete="off" />
    </div>
    <div class="field">
      <label for="rev">Max revisions</label>
      <input id="rev" type="number" min="0" max="6" value="2" />
    </div>
    <div>
      <button class="run" id="go">Generate</button>
    </div>
  </div>
  <div class="timer" id="timer"></div>

  <!-- pipeline board: the feedback cable from reviewer back to writer is the point -->
  <div class="board" id="board">
    <svg id="cable"><defs>
      <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0" stop-color="#9d7bff"/><stop offset="1" stop-color="#6b9bff"/>
      </linearGradient></defs>
      <path id="cable-path"></path><path id="cable-flow"></path>
    </svg>
    <span class="cable-tag" id="cable-tag">↩ revise</span>

    <div class="mod" id="m-research"><div class="stat"></div><div class="n">01</div><h3>Research</h3><div class="read">—</div></div>
    <div class="connector" data-c="0"></div>
    <div class="mod" id="m-outline"><div class="stat"></div><div class="n">02</div><h3>Outline</h3><div class="read">—</div></div>
    <div class="connector" data-c="1"></div>
    <div class="mod" id="m-seo"><div class="stat"></div><div class="n">03</div><h3>SEO</h3><div class="read">—</div></div>
    <div class="connector" data-c="2"></div>
    <div class="mod" id="m-writer"><div class="stat"></div><div class="n">04</div><h3>Writer</h3><div class="read">—</div></div>
    <div class="connector" data-c="3"></div>
    <div class="mod" id="m-reviewer"><div class="stat"></div><div class="n">05</div><h3>Reviewer</h3><div class="read">—</div></div>
    <div class="connector" data-c="4"></div>
    <div class="mod" id="m-save"><div class="stat"></div><div class="n">06</div><h3>Save</h3><div class="read">—</div></div>
  </div>

  <div class="lower">
    <div class="card">
      <div class="head"><span>Activity</span><span id="run-topic"></span></div>
      <div class="log" id="log"><div class="empty">Enter a topic and press Generate to watch the agents work. Each stage reports as it runs; a revision sends the draft back up the chain.</div></div>
    </div>

    <div class="card hidden" id="result">
      <div class="head"><span>Post</span>
        <div class="acts">
          <button id="copy">Copy Markdown</button>
          <button id="dl">Download .md</button>
        </div>
      </div>
      <p class="banner hidden" id="banner"></p>
      <div class="meta" id="meta"></div>
      <div class="post" id="post"></div>
    </div>
  </div>
</div>

<script>
const $=s=>document.querySelector(s);
const MODS=["research","outline","seo","writer","reviewer","save"];
let raw="", fullContent="", startTs=0, timerId=null;

/* ---- health ---- */
async function health(){
  try{
    const r=await fetch("/api/health"); const j=await r.json();
    if(j.ok){
      $("#dot").className="dot up";
      $("#health-text").textContent=`${j.provider} · ${j.model}`+(j.model_available?"":" (not pulled?)");
    }else{
      $("#dot").className="dot down";
      $("#health-text").textContent=`${j.provider} unreachable — start the server at ${j.base_url}`;
    }
  }catch(e){ $("#dot").className="dot down"; $("#health-text").textContent="server offline"; }
}
health();

/* ---- board helpers ---- */
function mod(name){return $("#m-"+name);}
function setState(name,cls){const m=mod(name);m.classList.remove("active","done","warn");if(cls)m.classList.add(cls);}
function read(name,html){mod(name).querySelector(".read").innerHTML=html;}
function connector(i,on){const c=document.querySelector(`.connector[data-c="${i}"]`);if(c)c.classList.toggle("hot",on);}
function resetBoard(){
  MODS.forEach(n=>{setState(n,"");read(n,"—");
    const b=mod(n).querySelector(".badge");if(b)b.remove();});
  for(let i=0;i<5;i++)connector(i,false);
  $("#result").classList.add("hidden");
  $("#log").innerHTML="";
}
function badge(name,text,cls){
  let b=mod(name).querySelector(".badge");
  if(!b){b=document.createElement("span");b.className="badge";mod(name).appendChild(b);}
  b.className="badge "+cls; b.textContent=text;
}

/* ---- feedback cable geometry ---- */
function drawCable(){
  const board=$("#board"), svg=$("#cable");
  const b=board.getBoundingClientRect();
  const wr=mod("writer").getBoundingClientRect(), rr=mod("reviewer").getBoundingClientRect();
  const stacked=window.matchMedia("(max-width:900px)").matches;
  let x1,y1,x2,y2,d;
  if(stacked){
    x1=rr.left-b.left; y1=rr.top-b.top+rr.height/2;
    x2=wr.left-b.left; y2=wr.top-b.top+wr.height/2;
    const midX=Math.min(x1,x2)-26;
    d=`M ${x1} ${y1} C ${midX} ${y1}, ${midX} ${y2}, ${x2} ${y2}`;
  }else{
    x1=rr.left+rr.width/2-b.left; y1=rr.top-b.top;
    x2=wr.left+wr.width/2-b.left; y2=wr.top-b.top;
    const midY=Math.min(y1,y2)-40;
    d=`M ${x1} ${y1} C ${x1} ${midY}, ${x2} ${midY}, ${x2} ${y2}`;
    $("#cable-tag").style.left=((x1+x2)/2-20)+"px";
    $("#cable-tag").style.top=(midY-4)+"px";
  }
  $("#cable-path").setAttribute("d",d); $("#cable-flow").setAttribute("d",d);
  svg.style.width=b.width+"px"; svg.style.height=b.height+"px";
  svg.setAttribute("viewBox",`0 0 ${b.width} ${b.height}`);
}
window.addEventListener("resize",drawCable);
window.addEventListener("load",drawCable);

function pulseCable(){
  const f=$("#cable-flow"); f.classList.remove("pulse"); void f.offsetWidth; f.classList.add("pulse");
  const tag=$("#cable-tag"); tag.classList.add("on"); setTimeout(()=>tag.classList.remove("on"),1400);
}

/* ---- log ---- */
function stamp(){const s=((Date.now()-startTs)/1000).toFixed(1);return s+"s";}
function logRow(kind,msg,extra){
  if($("#log .empty"))$("#log").innerHTML="";
  const row=document.createElement("div");row.className="row";
  row.innerHTML=`<div class="k ${kind}"></div><div class="t">${stamp()}</div><div class="msg">${msg}${extra||""}</div>`;
  $("#log").appendChild(row); $("#log").scrollTop=$("#log").scrollHeight;
}

/* ---- markdown ---- */
function renderMd(md){
  md=md.replace(/^---[\s\S]*?---\s*/,"");
  const esc=s=>s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const inline=t=>esc(t).replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")
    .replace(/\*(.+?)\*/g,"<em>$1</em>").replace(/`(.+?)`/g,"<code>$1</code>")
    .replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  let out="",list=false;
  md.split("\n").forEach(line=>{
    if(/^\s*[-*]\s+/.test(line)){if(!list){out+="<ul>";list=true;}out+="<li>"+inline(line.replace(/^\s*[-*]\s+/,""))+"</li>";return;}
    if(list){out+="</ul>";list=false;}
    if(/^###\s+/.test(line))out+="<h3>"+inline(line.slice(4))+"</h3>";
    else if(/^##\s+/.test(line))out+="<h2>"+inline(line.slice(3))+"</h2>";
    else if(/^#\s+/.test(line))out+="<h1>"+inline(line.slice(2))+"</h1>";
    else if(/^>\s?/.test(line))out+="<blockquote>"+inline(line.replace(/^>\s?\[?!?\w*\]?\s?/,""))+"</blockquote>";
    else if(line.trim())out+="<p>"+inline(line)+"</p>";
  });
  if(list)out+="</ul>";
  return out;
}

/* ---- event handling ---- */
function handle(ev){
  const s=ev.stage, d=ev.detail||{};
  if(ev.kind==="run_start"){ $("#run-topic").textContent=ev.topic; logRow("signal",`<b>run started</b> · “${ev.topic}” · up to ${ev.max_revisions} revisions`); return; }
  if(ev.kind==="start"){
    setState(s,"active");
    const idx=MODS.indexOf(s); if(idx>0)connector(idx-1,true);
    if(s==="writer"&&ev.revision>0){ badge("writer",`rev ${ev.revision}`,"rev"); logRow("signal",`<b>writer</b> revising (pass ${ev.revision})`); }
    else logRow("signal",`<b>${s}</b> running`);
    return;
  }
  if(ev.kind==="done"){
    const idx=MODS.indexOf(s); if(idx>0)connector(idx-1,false);
    if(s==="research"){setState(s,"done");read(s,`angle set · <b>${d.key_points}</b> key points`);logRow("signal",`research done · ${d.key_points} key points`);}
    if(s==="outline"){setState(s,"done");read(s,`<b>${d.sections}</b> sections<br>“${d.title}”`);logRow("signal",`outline done · <b>${d.sections}</b> sections`);}
    if(s==="seo"){setState(s,"done");read(s,`kw: <b>${d.primary_keyword}</b><br>/${d.slug}`);logRow("signal",`seo done · “${d.primary_keyword}”`);}
    if(s==="writer"){setState(s,"done");read(s,`<b>${d.word_count}</b> words`+(ev.revision?` · rev ${ev.revision}`:""));logRow("signal",`draft ready · <b>${d.word_count}</b> words`);}
    if(s==="reviewer"){
      const rev=d.verdict==="approve";
      setState(s,rev?"done":"warn");
      read(s,`verdict <b>${d.verdict}</b><br>${d.blockers} blocker · ${d.minor} minor`);
      badge("reviewer",d.verdict,rev?"approve":"revise");
      let issues="";
      (d.issues||[]).forEach(i=>{issues+=`<div class="issue"><span class="sev ${i.severity}">${i.severity}</span> · ${i.location}: ${i.problem}</div>`;});
      logRow(rev?"approve":"revise",`reviewer: <b>${d.verdict}</b> — ${d.blockers} blocker(s), ${d.minor} minor`,issues);
    }
    if(s==="save"){ setState(s,d.unresolved?"warn":"done"); read(s,`saved<br>${d.unresolved?d.unresolved+" open blocker(s)":"clean"}`); showResult(d); }
    return;
  }
  if(ev.kind==="route"){
    if(ev.to==="writer"){ pulseCable(); logRow("revise",`<b>routing back to writer</b> — ${ev.reason}`); }
    else logRow("approve",`<b>ready to save</b> — ${ev.reason}`);
    return;
  }
  if(ev.kind==="error"){ logRow("blocker",`<b>error</b> — ${ev.message}`); }
}

function showResult(d){
  fullContent=d.content||"";
  $("#result").classList.remove("hidden");
  const b=$("#banner");
  if(d.unresolved){b.classList.remove("hidden");b.textContent=`Shipped with ${d.unresolved} unresolved blocker(s) at the revision limit — see the reviewer notes above.`;}
  else b.classList.add("hidden");
  $("#meta").innerHTML=`
    <div class="cell"><span>slug</span><div>${d.slug}</div></div>
    <div class="cell"><span>primary keyword</span><div>${d.primary_keyword}</div></div>
    <div class="cell"><span>meta title</span><div>${d.meta_title}</div></div>
    <div class="cell"><span>revisions</span><div>${d.revisions}</div></div>
    <div class="cell" style="grid-column:1/-1"><span>meta description</span><div>${d.meta_description}</div></div>`;
  $("#post").innerHTML=renderMd(d.content||"");
  drawCable();
}

/* ---- run ---- */
async function run(){
  const topic=$("#topic").value.trim(); if(!topic){$("#topic").focus();return;}
  $("#go").disabled=true; $("#go").textContent="Running…";
  resetBoard(); drawCable();
  startTs=Date.now();
  clearInterval(timerId);
  timerId=setInterval(()=>{$("#timer").textContent="elapsed "+((Date.now()-startTs)/1000).toFixed(1)+"s";},100);

  try{
    const resp=await fetch("/api/run",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({topic,audience:$("#audience").value.trim()||"general readers",max_revisions:+$("#rev").value})});
    const reader=resp.body.getReader(); const dec=new TextDecoder(); let buf="";
    while(true){
      const {value,done}=await reader.read(); if(done)break;
      buf+=dec.decode(value,{stream:true});
      let nl; while((nl=buf.indexOf("\n"))>=0){
        const line=buf.slice(0,nl).trim(); buf=buf.slice(nl+1);
        if(!line)continue; const ev=JSON.parse(line);
        if(ev.kind==="end")break; handle(ev);
      }
    }
  }catch(e){ logRow("blocker",`<b>connection lost</b> — ${e.message}`); }
  finally{
    clearInterval(timerId);
    $("#go").disabled=false; $("#go").textContent="Generate";
  }
}
$("#go").addEventListener("click",run);
$("#topic").addEventListener("keydown",e=>{if(e.key==="Enter")run();});

/* ---- result actions ---- */
$("#copy").addEventListener("click",()=>{
  const body=fullContent.replace(/^---[\s\S]*?---\s*/,"");
  navigator.clipboard.writeText(body).then(()=>{$("#copy").textContent="Copied";setTimeout(()=>$("#copy").textContent="Copy Markdown",1200);});
});
$("#dl").addEventListener("click",()=>{
  const slug=($("#meta .cell div")||{}).textContent||"post";
  const blob=new Blob([fullContent],{type:"text/markdown"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=slug+".md";a.click();
});
</script>
</body>
