# Single application container + a local model.
#   docker compose up --build
#   docker compose exec ollama ollama pull llama3.1     # first run only
#   open http://localhost:8000
#
# Prefer a model already running on the HOST (e.g. LM Studio, or your own
# Ollama)? Delete the ollama service + depends_on, and set in .env:
#   BLOG_BASE_URL=http://host.docker.internal:11434/v1

services:
  app:
    build: .
    restart: unless-stopped
    environment:
      BLOG_PROVIDER: ${BLOG_PROVIDER:-ollama}
      BLOG_BASE_URL: ${BLOG_BASE_URL:-http://ollama:11434/v1}
      BLOG_MODEL: ${BLOG_MODEL:-llama3.1}
      BLOG_MAX_REVISIONS: ${BLOG_MAX_REVISIONS:-2}
      OUTPUT_DIR: /data/output
    volumes:
      - ./output:/data/output
    ports:
      - "8000:8000"

